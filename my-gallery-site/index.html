<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视觉图床</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #dropZone {
            transition: all 0.3s ease;
        }

        .drag-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-gray-50 p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-gray-800">图片知识库</h1>

        <!-- 上传区域 -->
        <div id="dropZone"
            class="bg-white p-10 rounded-2xl shadow-sm border-2 border-dashed border-gray-300 mb-8 text-center cursor-pointer hover:bg-gray-50 flex flex-col items-center justify-center">
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <div class="text-6xl mb-4">☁️</div>
            <h2 class="text-xl font-bold text-gray-700 mb-2">拖拽图片到此处，或点击浏览上传</h2>
            <p class="text-gray-400 text-sm">支持批量上传，系统将自动提取图片标签</p>
            <button onclick="document.getElementById('fileInput').click()"
                class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition shadow-md">
                选择图片
            </button>
            <p id="uploadStatus" class="mt-4 text-sm text-gray-500 font-medium"></p>
        </div>

        <!-- 搜索区域 -->
        <div class="mb-8 flex gap-4 shadow-sm">
            <input type="text" id="searchInput" placeholder="搜索图库内容 (按回车键搜索)..."
                class="flex-1 p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
            <button onclick="loadImages()"
                class="bg-gray-900 text-white px-8 py-4 rounded-xl hover:bg-black transition font-bold text-lg">检索</button>
        </div>

        <!-- 图库展示 -->
        <div id="gallery" class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-6"></div>
    </div>

    <script>
	// 【关键！】在这里填入你刚刚部署的 Worker 网址！
        const API_URL = 'https://ai-tu.xy2luxingzhen2.workers.dev/';

        // 绑定搜索回车事件
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadImages();
            }
        });

        // 拖拽处理
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFiles(e.target.files);
        });

        // 核心技术：在本地为 AI 生成极小体积的缩略图，防止 Cloudflare Worker 解包数组时 CPU 超时！
        function compressImageForAI(file, maxWidth = 512) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(new File([blob], "thumb_" + file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', 0.6); // 极大压缩供 AI 专用
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // 文件上传处理
        async function handleFiles(files) {
            const statusText = document.getElementById('uploadStatus');
            const total = files.length;
            let successCount = 0;
            let errorList = []; // 收集失败原因

            statusText.className = 'mt-4 text-blue-600 font-bold text-base';

            for (let i = 0; i < total; i++) {
                const file = files[i];
                statusText.innerText = `正在处理第 ${i + 1} / ${total} 张图片：${file.name}... (请勿关闭页面)`;

                // 尝试生成专用缩略图喂给AI，极大地节省服务端计算资源
                let thumbnailFile = file;
                try {
                    thumbnailFile = await compressImageForAI(file);
                } catch (e) {
                    console.log('生成AI缩略图失败，将直接发送原图识别', e);
                }

                const formData = new FormData();
                formData.append('file', file);       // 原图发去图床存着
                formData.append('thumbnail', thumbnailFile); // 缩略图发去给AI看

                try {
                    const res = await fetch(API_URL, { method: 'POST', body: formData });
                    const data = await res.json();

                    if (data.success) {
                        successCount++;
                        loadImages(); // 实时刷新
                    } else {
                        console.error(`上传失败 (${file.name}):`, data.error);
                        errorList.push(`${file.name}: ${data.error}`);
                    }
                } catch (err) {
                    console.error(`网络异常 (${file.name}):`, err);
                    errorList.push(`${file.name}: 网络异常或超时`);
                }

                // 添加 2 秒的强制延迟，防止 Cloudflare AI 接口被高并发挤爆引发 429 或 500 错误
                if (i < total - 1) {
                    statusText.innerText = `处理完成，等待 2 秒冷却，准备上传下一张...`;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }

            if (errorList.length === 0) {
                statusText.className = 'mt-4 text-green-600 font-bold text-base';
                statusText.innerText = `处理完成！成功上传全部 ${successCount} 张图片。`;
                setTimeout(() => { statusText.innerText = ''; }, 5000);
            } else {
                statusText.className = 'mt-4 text-orange-600 font-bold text-sm';
                statusText.innerHTML = `处理结束。成功 ${successCount} 张，失败 ${errorList.length} 张。<br>失败原因: ${errorList.join('; ')}`;
                // 发生错误时不清空提示，以便用户查看
            }
        }

        // 加载图片数据
        async function loadImages() {
            const keyword = document.getElementById('searchInput').value;
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">数据加载中...</p>';

            try {
                const res = await fetch(`${API_URL}?keyword=${encodeURIComponent(keyword)}`);
                const images = await res.json();

                gallery.innerHTML = '';
                if (images.length === 0) {
                    gallery.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">未查找到相关图片</p>';
                    return;
                }

                images.forEach(img => {
                    const card = `
                        <div class="break-inside-avoid mb-6 bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-xl transition-all duration-300 group border border-gray-100">
                            <a href="${img.image_url}" target="_blank" title="查看原图" class="block overflow-hidden relative">
                                <img src="${img.image_url}" class="w-full h-auto block group-hover:scale-110 transition-transform duration-500">
                                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-10 transition duration-300"></div>
                            </a>
                            <div class="p-5">
                                <p class="text-sm text-blue-600 font-bold leading-relaxed mb-3">🏷️ ${img.ai_tags.replace(/,/g, ' <span class="text-gray-300">|</span> ')}</p>
                                <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-50">
                                    <span class="text-xs text-gray-400 font-mono whitespace-nowrap">${img.upload_time.split(' ')[0]}</span>
                                    <div class="space-x-1 shrink-0 ml-2">
                                        <button onclick="copyToClipboard('${img.image_url}', this)" class="text-xs bg-gray-100 px-3 py-1.5 rounded-lg hover:bg-gray-800 hover:text-white transition font-medium">复制</button>
                                        <button onclick="deleteImage('${img.image_url}', this.closest('.group'))" class="text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-600 hover:text-white transition font-medium">删除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    gallery.innerHTML += card;
                });
            } catch (err) {
                gallery.innerHTML = '<p class="text-red-500 col-span-full text-center py-10">加载失败，请重试</p>';
            }
        }

        // 复制链接
        function copyToClipboard(url, btnElement) {
            navigator.clipboard.writeText(url);
            const originalText = btnElement.innerText;
            btnElement.innerText = '已复制';
            btnElement.classList.add('bg-green-100', 'text-green-700');
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.remove('bg-green-100', 'text-green-700');
            }, 2000);
        }

        // 删除图片
        async function deleteImage(imageUrl, cardElement) {
            if (!confirm('确认永久删除该图片？')) return;

            const btn = cardElement.querySelector('.text-red-600');
            const originalText = btn.innerText;
            btn.innerText = '删除中...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}?url=${encodeURIComponent(imageUrl)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (data.success) {
                    cardElement.style.transition = 'all 0.3s';
                    cardElement.style.opacity = '0';
                    cardElement.style.transform = 'scale(0.9)';
                    setTimeout(() => cardElement.remove(), 300);
                } else {
                    alert('删除失败: ' + data.error);
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('删除异常，请稍后再试');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 初始化
        loadImages();
    </script>
</body>

</html>
